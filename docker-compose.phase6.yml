services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PHASE6_DOMAIN: ${PHASE6_DOMAIN}
      ZC_DOMAIN: ${ZC_DOMAIN:-zc.zeaz.dev}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      phase6-api:
        condition: service_healthy
      zc-api:
        condition: service_healthy
      grafana:
        condition: service_healthy
      jaeger:
        condition: service_started

  phase6-api:
    build:
      context: ./services/phase6-api
    restart: unless-stopped
    environment:
      PHASE6_API_TOKEN: ${PHASE6_API_TOKEN}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      UPLOAD_DIR: /data/uploads
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_TABLE: ${SUPABASE_TABLE:-}
      AI_PROVIDER_ENDPOINTS: ${AI_PROVIDER_ENDPOINTS}
      AI_PROVIDER_KEYS_JSON: ${AI_PROVIDER_KEYS_JSON}
      AI_MODEL: ${AI_MODEL:-Qwen/Qwen2.5-Coder-32B-Instruct}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
    volumes:
      - phase6_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; request = urllib.request.Request('http://127.0.0.1:8080/health', headers={'Authorization': 'Bearer ' + os.environ['PHASE6_API_TOKEN']}); urllib.request.urlopen(request).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  zc-api:
    build:
      context: .
      dockerfile: services/zc/Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ZC_ENVIRONMENT:-production}
      API_HOST: 0.0.0.0
      API_PORT: 8420
      ZC_API_TOKEN: ${ZC_API_TOKEN:?set ZC_API_TOKEN in .env}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ZC_LOG_LEVEL: ${ZC_LOG_LEVEL:-INFO}
    volumes:
      - zc_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8420/v1/wire/health/live').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  ai-gateway:
    build:
      context: .
      dockerfile: deploy/docker/ai-gateway.Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8400
      Z_PLATFORM_SERVICE_TOKEN: ${Z_PLATFORM_SERVICE_TOKEN:?set Z_PLATFORM_SERVICE_TOKEN in .env}
      AI_MODEL: ${AI_MODEL:-meta/llama-3.1-8b-instruct}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-}
      AI_MODELS_JSON: ${AI_MODELS_JSON:-[]}
      AI_PROVIDER_KEYS_JSON: ${AI_PROVIDER_KEYS_JSON:-{}}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-nvidia}
      LOG_LEVEL: ${AI_GATEWAY_LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:8400:8400"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8400/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  zchat:
    build:
      context: .
      dockerfile: deploy/docker/node-service.Dockerfile
      args:
        SERVICE_PATH: apps/zchat
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3021
      Z_PLATFORM_SERVICE_TOKEN: ${Z_PLATFORM_SERVICE_TOKEN:?set Z_PLATFORM_SERVICE_TOKEN in .env}
      Z_PLATFORM_AI_GATEWAY_URL: http://ai-gateway:8400
      AI_MODEL: ${AI_MODEL:-meta/llama-3.1-8b-instruct}
      PHASE6_API_URL: http://phase6-api:8080
      PHASE6_API_TOKEN: ${PHASE6_API_TOKEN:?set PHASE6_API_TOKEN in .env}
      ZC_API_URL: http://zc-api:8420
      ZC_API_TOKEN: ${ZC_API_TOKEN:?set ZC_API_TOKEN in .env}
      ZCHAT_SESSION_TTL_SECONDS: ${ZCHAT_SESSION_TTL_SECONDS:-3600}
    ports:
      - "127.0.0.1:3021:3021"
    depends_on:
      ai-gateway:
        condition: service_healthy
      phase6-api:
        condition: service_healthy
      zc-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3021/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./services/phase6-api/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:12.1.0
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-grafana.zeaz.dev}/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/phase6-api/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  caddy_data:
  caddy_config:
  phase6_data:
  redis_data:
  zc_data:
  prometheus_data:
  grafana_data:
