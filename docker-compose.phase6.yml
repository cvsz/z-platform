services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PHASE6_DOMAIN: ${PHASE6_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      phase6-api:
        condition: service_healthy
      grafana:
        condition: service_healthy
      jaeger:
        condition: service_started

  phase6-api:
    build:
      context: ./services/phase6-api
    restart: unless-stopped
    environment:
      PHASE6_API_TOKEN: ${PHASE6_API_TOKEN}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      UPLOAD_DIR: /data/uploads
      AI_PROVIDER_ENDPOINTS: ${AI_PROVIDER_ENDPOINTS}
      AI_PROVIDER_KEYS_JSON: ${AI_PROVIDER_KEYS_JSON}
      AI_MODEL: ${AI_MODEL:-Qwen/Qwen2.5-Coder-32B-Instruct}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
    volumes:
      - phase6_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./services/phase6-api/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:12.1.0
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://${PHASE6_DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/phase6-api/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  caddy_data:
  caddy_config:
  phase6_data:
  redis_data:
  prometheus_data:
  grafana_data:
