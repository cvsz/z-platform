apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: z-platform
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - services.yaml
  - redis.yaml
  - deployments.yaml
  - networkpolicy.yaml
  - poddisruptionbudgets.yaml

# Production overlays MUST replace these development image references with
# immutable image digests before applying them to a cluster.
images:
  - name: ghcr.io/zeazdev/z-platform/phase6-api
    newName: ghcr.io/zeazdev/z-platform/phase6-api
    newTag: dev
  - name: ghcr.io/zeazdev/z-platform/zc-api
    newName: ghcr.io/zeazdev/z-platform/zc-api
    newTag: dev
  - name: ghcr.io/zeazdev/z-platform/ai-gateway
    newName: ghcr.io/zeazdev/z-platform/ai-gateway
    newTag: dev
  - name: ghcr.io/zeazdev/z-platform/zchat
    newName: ghcr.io/zeazdev/z-platform/zchat
    newTag: dev
