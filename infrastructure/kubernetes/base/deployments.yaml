apiVersion: apps/v1
kind: Deployment
metadata:
  name: phase6-api
  labels: {app.kubernetes.io/name: phase6-api, app.kubernetes.io/part-of: z-platform}
spec:
  replicas: 3
  selector: {matchLabels: {app.kubernetes.io/name: phase6-api}}
  template:
    metadata: {labels: {app.kubernetes.io/name: phase6-api, app.kubernetes.io/part-of: z-platform}}
    spec:
      serviceAccountName: z-platform
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: phase6-api
          image: ghcr.io/cvsz/z-platform/phase6-api:dev
          ports: [{name: http, containerPort: 8080}]
          envFrom: [{secretRef: {name: z-platform-runtime}}]
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 20
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 1, memory: 1Gi}
          securityContext: {runAsUser: 10001, runAsGroup: 10001, allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zc-api
  labels: {app.kubernetes.io/name: zc-api, app.kubernetes.io/part-of: z-platform}
spec:
  replicas: 3
  selector: {matchLabels: {app.kubernetes.io/name: zc-api}}
  template:
    metadata: {labels: {app.kubernetes.io/name: zc-api, app.kubernetes.io/part-of: z-platform}}
    spec:
      serviceAccountName: z-platform
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: zc-api
          image: ghcr.io/cvsz/z-platform/zc-api:dev
          ports: [{name: http, containerPort: 8420}, {name: grpc, containerPort: 8421}]
          envFrom: [{secretRef: {name: z-platform-runtime}}]
          readinessProbe: {httpGet: {path: /v1/wire/health/ready, port: http}, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /v1/wire/health/live, port: http}, periodSeconds: 20}
          resources: {requests: {cpu: 250m, memory: 512Mi}, limits: {cpu: 2, memory: 2Gi}}
          securityContext: {runAsUser: 10001, runAsGroup: 10001, allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
---
