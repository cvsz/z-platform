apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: default-deny-ingress}
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: z-platform-internal}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/part-of: z-platform}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/part-of: z-platform}}}]
    - ports: [{protocol: TCP, port: 3021}, {protocol: TCP, port: 8420}, {protocol: TCP, port: 8400}, {protocol: TCP, port: 8080}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/part-of: z-platform}}}]
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: kube-system}}}]
    - ports: [{protocol: UDP, port: 53}, {protocol: TCP, port: 53}, {protocol: TCP, port: 443}]
