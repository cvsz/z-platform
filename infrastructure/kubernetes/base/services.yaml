apiVersion: v1
kind: Service
metadata:
  name: phase6-api
spec:
  selector: {app.kubernetes.io/name: phase6-api}
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: zc-api
spec:
  selector: {app.kubernetes.io/name: zc-api}
  ports:
    - name: http
      port: 8420
      targetPort: http
    - name: grpc
      port: 8421
      targetPort: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
spec:
  selector: {app.kubernetes.io/name: ai-gateway}
  ports:
    - name: http
      port: 8400
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: zchat
spec:
  selector: {app.kubernetes.io/name: zchat}
  ports:
    - name: http
      port: 3021
      targetPort: http
