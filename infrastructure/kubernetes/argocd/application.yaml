apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: z-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zeazdev/z-platform.git
    targetRevision: main
    path: infrastructure/kubernetes/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: z-platform
  # Manual sync is intentional until production image digests, external
  # secrets, and release approval are bound to this exact revision.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
