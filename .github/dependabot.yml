# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # npm/pnpm (root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # npm/pnpm (apps)
  - package-ecosystem: "npm"
    directory: "/apps"
    schedule:
      interval: "weekly"

  # npm/pnpm (services)
  - package-ecosystem: "npm"
    directory: "/services"
    schedule:
      interval: "weekly"

  # npm/pnpm (packages)
  - package-ecosystem: "npm"
    directory: "/packages"
    schedule:
      interval: "weekly"

  # npm/pnpm (tools)
  - package-ecosystem: "npm"
    directory: "/tools"
    schedule:
      interval: "weekly"

  # Go
  - package-ecosystem: "gomod"
    directory: "/tools/zctl"
    schedule:
      interval: "weekly"

  # Python
  - package-ecosystem: "pip"
    directory: "/services/zc"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/services/phase6-api"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/apps/zaicoder/backend"
    schedule:
      interval: "weekly"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform/cloudflare"
    schedule:
      interval: "weekly"
