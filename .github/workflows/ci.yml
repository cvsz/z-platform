name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Test workspace packages
        run: pnpm test
      - name: Verify ZAI Coder gateway-only coverage
        run: npm test --prefix apps/zaicoder/web
      - name: Verify AI Gateway provider coverage
        run: npm test --prefix services/ai-gateway
      - name: Verify Agent Orchestrator lifecycle coverage
        run: npm test --prefix services/agent-orchestrator
      - name: Verify Workspace Runtime coverage
        run: npm test --prefix services/workspace-runtime
      - name: Verify Billing Ledger coverage
        run: npm test --prefix services/billing-ledger
      - name: Verify ZChat coverage
        run: npm test --prefix apps/zchat
      - name: Verify ZOW coverage
        run: npm test --prefix apps/zow
      - name: Verify ZWallet adapter coverage
        run: npm test --prefix apps/zwallet
