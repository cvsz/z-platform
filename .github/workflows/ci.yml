name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Test
        run: pnpm test
