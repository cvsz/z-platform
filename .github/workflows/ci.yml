name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.4.0
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Test runnable Node workspaces
        shell: bash
        run: |
          set -euo pipefail
          for workspace in packages/contracts apps/zaicoder/web services/ai-gateway services/agent-orchestrator services/workspace-runtime services/billing-ledger apps/zchat apps/zow apps/zwallet tools/zai-factory; do
            if [ ! -f "$workspace/package.json" ]; then
              echo "skip $workspace: no package.json"
              continue
            fi
            if ! find "$workspace" -path '*/node_modules' -prune -o -name '*.test.mjs' -print -quit | grep -q .; then
              echo "skip $workspace: no node test files"
              continue
            fi
            echo "test $workspace"
            npm test --prefix "$workspace" --if-present
          done
