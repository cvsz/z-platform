name: Publish container images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: phase6-api
            context: services/phase6-api
            file: services/phase6-api/Dockerfile
          - name: zc-api
            context: .
            file: services/zc/Dockerfile
          - name: ai-gateway
            context: .
            file: deploy/docker/ai-gateway.Dockerfile
          - name: zchat
            context: .
            file: deploy/docker/node-service.Dockerfile
            service_path: apps/zchat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish immutable image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_PATH=${{ matrix.service_path }}
            OCI_REVISION=${{ github.sha }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_CREATED=${{ github.event.head_commit.timestamp }}
            OCI_VERSION=sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Record digest
        run: |
          {
            echo "image=${{ steps.meta.outputs.tags }}"
            echo "revision=${GITHUB_SHA}"
            echo "digest=${{ steps.meta.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
