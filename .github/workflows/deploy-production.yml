name: Deploy production

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full commit SHA already published to GHCR
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Materialize secrets and sync Argo CD
    runs-on: self-hosted
    environment: production
    env:
      RELEASE_SHA: ${{ inputs.release_sha }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      Z_PLATFORM_SERVICE_TOKEN: ${{ secrets.Z_PLATFORM_SERVICE_TOKEN }}
      ZC_API_TOKEN: ${{ secrets.ZC_API_TOKEN }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      AI_GATEWAY_PROVIDER_TOKEN: ${{ secrets.AI_GATEWAY_PROVIDER_TOKEN }}
      AGENT_AUDIT_URL: ${{ secrets.AGENT_AUDIT_URL }}
      AGENT_IDENTITY_URL: ${{ secrets.AGENT_IDENTITY_URL }}
      AGENT_JOB_STORE_URL: ${{ secrets.AGENT_JOB_STORE_URL }}
      AGENT_QUEUE_URL: ${{ secrets.AGENT_QUEUE_URL }}
      AGENT_SANDBOX_URL: ${{ secrets.AGENT_SANDBOX_URL }}
      BILLING_LEDGER_URL: ${{ secrets.BILLING_LEDGER_URL }}

    steps:
      - name: Validate immutable release input
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          for name in GHCR_USERNAME GHCR_PULL_TOKEN Z_PLATFORM_SERVICE_TOKEN ZC_API_TOKEN JWT_SECRET ENCRYPTION_KEY AI_GATEWAY_PROVIDER_TOKEN; do
            [[ -n "${!name:-}" ]] || { echo "Missing required production secret: $name" >&2; exit 1; }
          done

      - name: Verify Kubernetes context
        shell: bash
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl get node --no-headers | awk '$2 == "Ready" { found=1 } END { exit(found ? 0 : 1) }'

      - name: Materialize runtime secret without logging values
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n z-platform create namespace z-platform --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n z-platform create secret generic z-platform-runtime \
            --from-literal=Z_PLATFORM_SERVICE_TOKEN="$Z_PLATFORM_SERVICE_TOKEN" \
            --from-literal=ZC_API_TOKEN="$ZC_API_TOKEN" \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            --from-literal=AI_GATEWAY_PROVIDER_TOKEN="$AI_GATEWAY_PROVIDER_TOKEN" \
            --from-literal=AGENT_AUDIT_URL="${AGENT_AUDIT_URL:-}" \
            --from-literal=AGENT_IDENTITY_URL="${AGENT_IDENTITY_URL:-}" \
            --from-literal=AGENT_JOB_STORE_URL="${AGENT_JOB_STORE_URL:-}" \
            --from-literal=AGENT_QUEUE_URL="${AGENT_QUEUE_URL:-}" \
            --from-literal=AGENT_SANDBOX_URL="${AGENT_SANDBOX_URL:-}" \
            --from-literal=BILLING_LEDGER_URL="${BILLING_LEDGER_URL:-}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Materialize private GHCR pull secret
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n z-platform create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password "$GHCR_PULL_TOKEN" \
            --docker-email="platform@zeazdev.com" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Request Argo CD sync for the selected release
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n argocd patch application z-platform --type=merge \
            -p '{"operation":{"sync":{"prune":true}}}'
          for attempt in $(seq 1 60); do
            sync_status=$(kubectl -n argocd get application z-platform -o jsonpath='{.status.sync.status}')
            health_status=$(kubectl -n argocd get application z-platform -o jsonpath='{.status.health.status}')
            if [[ "$sync_status" == "Synced" && "$health_status" == "Healthy" ]]; then
              exit 0
            fi
            sleep 10
          done
          kubectl -n argocd get application z-platform -o yaml
          exit 1
