name: final-release-readiness

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full immutable release SHA
        required: true
        type: string
      issue_number:
        description: Readiness issue to finalize
        required: true
        default: "1"
        type: string

permissions:
  contents: read
  actions: read
  attestations: write
  id-token: write
  issues: write

jobs:
  verify-staging:
    name: Verify all Phase 6 real staging gates
    runs-on: self-hosted
    environment: staging
    env:
      RELEASE_SHA: ${{ inputs.release_sha }}
      STAGING_REVIEWER: ${{ vars.STAGING_REVIEWER }}
      STAGING_BEARER_TOKEN: ${{ secrets.STAGING_BEARER_TOKEN }}
      ALERT_TEST_URL: ${{ secrets.ALERT_TEST_URL }}
      ALERT_DELIVERY_STATUS_URL: ${{ secrets.ALERT_DELIVERY_STATUS_URL }}
      BACKUP_CREATE_COMMAND: ${{ secrets.BACKUP_CREATE_COMMAND }}
      BACKUP_RESTORE_COMMAND: ${{ secrets.BACKUP_RESTORE_COMMAND }}
      BACKUP_VERIFY_COMMAND: ${{ secrets.BACKUP_VERIFY_COMMAND }}
      AI_UPLOAD_URL: ${{ secrets.AI_UPLOAD_URL }}
      AI_PROVIDER_ENDPOINTS: ${{ secrets.AI_PROVIDER_ENDPOINTS }}
      AI_FAILOVER_URL: ${{ secrets.AI_FAILOVER_URL }}
    steps:
      - name: Validate immutable release
        run: |
          set -euo pipefail
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify checkout
        run: test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
      - name: Materialize protected inputs
        env:
          CONFIG_JSON: ${{ secrets.PHASE6_EXTERNAL_SUITE_CONFIG_JSON }}
          BROWSER_BUNDLE_BASE64: ${{ secrets.BROWSER_BUNDLE_BASE64 }}
          BROWSER_HAR_BASE64: ${{ secrets.BROWSER_HAR_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$CONFIG_JSON"
          test -n "$BROWSER_BUNDLE_BASE64"
          test -n "$BROWSER_HAR_BASE64"
          umask 077
          printf '%s' "$CONFIG_JSON" > /tmp/phase6.json
          mkdir -p artifacts/browser
          printf '%s' "$BROWSER_BUNDLE_BASE64" | base64 --decode > artifacts/browser/app.js
          printf '%s' "$BROWSER_HAR_BASE64" | base64 --decode > artifacts/browser/session.har
      - name: Enforce real-only inputs
        run: node scripts/validate-phase6-real-inputs.mjs /tmp/phase6.json artifacts/browser/app.js artifacts/browser/session.har
      - name: Execute all fourteen checks
        run: node scripts/phase6-external-suite.mjs /tmp/phase6.json final-release-evidence
      - name: Verify final staging result
        run: |
          test "$(jq -r '.result' final-release-evidence/phase6-external-evidence.json)" = VERIFIED
          test "$(jq '.checks | length' final-release-evidence/phase6-external-evidence.json)" -eq 14
          test "$(jq -r '.releaseSha' final-release-evidence/phase6-external-evidence.json)" = "$RELEASE_SHA"
      - uses: actions/upload-artifact@v4
        with:
          name: final-staging-evidence-${{ inputs.release_sha }}
          path: final-release-evidence/phase6-external-evidence.json
          if-no-files-found: error
          retention-days: 365
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: final-release-evidence/phase6-external-evidence.json
      - name: Cleanup
        if: always()
        run: rm -rf /tmp/phase6.json artifacts/browser

  approve-production:
    name: Explicit final production approval
    needs: verify-staging
    runs-on: self-hosted
    environment: production
    env:
      RELEASE_SHA: ${{ inputs.release_sha }}
      PRODUCTION_APPROVER: ${{ vars.PRODUCTION_APPROVER }}
    steps:
      - name: Record approval bound to release SHA
        run: |
          set -euo pipefail
          test -n "$PRODUCTION_APPROVER"
          jq -n \
            --arg sha "$RELEASE_SHA" \
            --arg approver "$PRODUCTION_APPROVER" \
            --arg at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run "$GITHUB_RUN_ID" \
            '{schemaVersion:"1.0.0",releaseSha:$sha,approver:$approver,approvedAt:$at,workflowRunId:$run,result:"APPROVED"}' \
            > production-approval.json
      - uses: actions/upload-artifact@v4
        with:
          name: final-production-approval-${{ inputs.release_sha }}
          path: production-approval.json
          if-no-files-found: error
          retention-days: 365
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: production-approval.json

  finalize:
    name: Finalize release and close readiness issue
    needs: [verify-staging, approve-production]
    runs-on: self-hosted
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_SHA: ${{ inputs.release_sha }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    steps:
      - name: Record verified final release
        run: |
          set -euo pipefail
          [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]
          body=$(cat <<EOF
          ## Final release VERIFIED

          - Release SHA: \`$RELEASE_SHA\`
          - Phase 6 external checks: **VERIFIED (14/14)**
          - Staging evidence: attested in workflow run \`$GITHUB_RUN_ID\`
          - Production approval: completed through the protected \`production\` environment
          - Placeholder/sample/local-only inputs: rejected by policy

          Issue completion is bound to this immutable SHA and workflow run.
          EOF
          )
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" -f body="$body"
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" -f state=closed -f state_reason=completed
