name: zctl

on:
  pull_request:
    paths:
      - "tools/zctl/**"
      - ".github/workflows/zctl.yml"
  push:
    branches: [main]
    paths:
      - "tools/zctl/**"
      - ".github/workflows/zctl.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/zctl/go.mod
          cache-dependency-path: tools/zctl/go.sum
      - name: Test and build zctl
        working-directory: tools/zctl
        run: |
          go test ./...
          go vet ./...
          go build ./cmd/zctl
